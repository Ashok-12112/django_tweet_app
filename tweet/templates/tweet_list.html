{% extends "layout.html" %}

{% block title %}
Tweet
{% endblock  %}

{% block content %}
<a class="btn btn-primary mb-3" href="{% url 'tweet_create' %}">
    Create a Tweet
</a>
<div class="container d-flex flex-row flex-wrap gap-3">
    {% for tweet in tweets %}
<div class="card" style="width: 12rem;">
  <img src="{{tweet.photo.url}}" class="card-img-top" style="height: 120px; object-fit: cover;" alt="...">
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ tweet.user.username }}</h5>
    <p class="card-text">{{ tweet.text }}</p>
    <div class="d-flex justify-content-between mt-auto">
      <a href="{% url 'tweet_edit' tweet.id %}" class="btn btn-primary btn-sm">edit</a>
      <a href="{% url 'tweet_delete' tweet.id %}" class="btn btn-danger btn-sm">Delete</a>
    </div>
  </div>
</div>

    {% endfor %}
</div>
{% endblock  %}
